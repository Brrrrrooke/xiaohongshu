<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>评论洞察助手</title>
<style>
body {font-family: Arial; max-width: 600px; margin: 40px auto;}
input, button {padding: 10px; font-size: 16px;}
.card {border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 10px;}
h3 {margin-top: 0;}
</style>
</head>
<body>

<h1>评论洞察助手</h1>

<input id="keyword" placeholder="输入关键词，比如‘敏感肌护肤’">
<button onclick="generate()">生成评论洞察</button>

<div id="result"></div>

<script>
function generate() {
  const kw = document.getElementById("keyword").value;

  const data = `
  <div class="card">
    <h3>高价值经验</h3>
    <ul>
      <li>${kw}要坚持一段时间才有效</li>
      <li>很多人说简单方法反而更有用</li>
      <li>预算不用太高也能做出效果</li>
    </ul>
  </div>

  <div class="card">
    <h3>避坑点</h3>
    <ul>
      <li>盲目跟风很容易踩雷</li>
      <li>有些推荐其实不适合所有人</li>
      <li>短期效果好的可能长期有问题</li>
    </ul>
  </div>

  <div class="card">
    <h3>补充信息</h3>
    <ul>
      <li>很多细节在评论区才提到</li>
      <li>不同人体验差异很大</li>
      <li>环境和个人情况影响结果</li>
    </ul>
  </div>
  `;

  document.getElementById("result").innerHTML = data;
}
</script>

</body>
</html>
